<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>欢迎页面 - 知行中国志愿者学习端</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 移动端适配 */
        @media (max-width: 640px) {
            .mobile-container {
                max-width: 100%;
                margin: 0 auto;
            }
        }
        
        /* 渐变背景 */
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 动画效果 */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        /* 按钮点击效果 */
        .btn-press {
            transition: all 0.2s ease;
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        
        /* 安全区域适配 */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col mobile-container">
    <!-- 状态栏模拟 -->
    <div class="bg-white safe-top">
        <div class="flex justify-between items-center px-4 py-2">
            <div class="text-sm font-medium">9:41</div>
            <div class="flex space-x-1">
                <div class="w-4 h-4 bg-gray-800 rounded-full"></div>
                <div class="w-4 h-4 bg-gray-800 rounded-full"></div>
                <div class="w-4 h-4 bg-gray-800 rounded-full"></div>
            </div>
        </div>
    </div>
    
    <!-- 主内容 -->
    <main class="flex-1 flex flex-col items-center justify-center p-6">
        <!-- 应用Logo和标题 -->
        <div class="text-center mb-8">
            <div class="w-24 h-24 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4 float-animation">
                <span class="text-4xl text-white">🧠</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">知行中国</h1>
            <p class="text-gray-600">脑健康志愿者培训平台</p>
        </div>
        
        <!-- 核心价值展示 -->
        <div class="w-full max-w-md mb-8">
            <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
                <h2 class="text-xl font-bold text-gray-800 mb-4">开启您的志愿者之旅</h2>
                
                <div class="space-y-4">
                    <div class="flex items-start">
                        <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                            <span class="text-blue-600">🎓</span>
                        </div>
                        <div>
                            <h3 class="font-medium text-gray-800">专业培训体系</h3>
                            <p class="text-sm text-gray-600">系统学习脑健康专业知识</p>
                        </div>
                    </div>
                    
                    <div class="flex items-start">
                        <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center mr-3">
                            <span class="text-green-600">🤝</span>
                        </div>
                        <div>
                            <h3 class="font-medium text-gray-800">实践机会匹配</h3>
                            <p class="text-sm text-gray-600">连接真实服务需求与志愿者</p>
                        </div>
                    </div>
                    
                    <div class="flex items-start">
                        <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center mr-3">
                            <span class="text-purple-600">🏆</span>
                        </div>
                        <div>
                            <h3 class="font-medium text-gray-800">成长认证体系</h3>
                            <p class="text-sm text-gray-600">获得专业认证和荣誉徽章</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 统计数据 -->
            <div class="grid grid-cols-3 gap-2 mb-6">
                <div class="bg-white rounded-xl p-3 text-center">
                    <div class="text-lg font-bold text-blue-600">5000+</div>
                    <div class="text-xs text-gray-600">注册志愿者</div>
                </div>
                <div class="bg-white rounded-xl p-3 text-center">
                    <div class="text-lg font-bold text-green-600">200+</div>
                    <div class="text-xs text-gray-600">专业课程</div>
                </div>
                <div class="bg-white rounded-xl p-3 text-center">
                    <div class="text-lg font-bold text-purple-600">10000+</div>
                    <div class="text-xs text-gray-600">服务小时</div>
                </div>
            </div>
        </div>
        
        <!-- 行动按钮 -->
        <div class="w-full max-w-md space-y-3 safe-bottom">
            <button onclick="window.location.href='onboarding-login.html'" 
                    class="btn-press w-full py-4 gradient-bg text-white font-bold rounded-xl text-lg shadow-lg hover:shadow-xl transition-shadow">
                立即开始
            </button>
            
            <button onclick="window.location.href='home-dashboard.html'"
                    class="btn-press w-full py-4 bg-white text-gray-800 font-medium rounded-xl text-lg border-2 border-gray-200 hover:border-blue-300 transition-colors">
                先看看
            </button>
            
            <div class="text-center pt-4">
                <p class="text-sm text-gray-500">
                    继续即表示同意
                    <a href="#" class="text-blue-600 font-medium">服务协议</a>
                    和
                    <a href="#" class="text-blue-600 font-medium">隐私政策</a>
                </p>
            </div>
        </div>
    </main>
    
    <!-- 底部导航提示 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 safe-bottom hidden">
        <div class="text-center">
            <p class="text-sm text-gray-600">滑动查看更多内容</p>
            <div class="flex justify-center mt-2">
                <div class="w-8 h-1 bg-gray-300 rounded-full"></div>
            </div>
        </div>
    </div>
    
    <!-- 原型导航 -->
    <div class="fixed top-4 right-4 z-10">
        <div class="bg-white rounded-full shadow-lg p-2">
            <button onclick="window.location.href='../index.html'" 
                    class="w-10 h-10 flex items-center justify-center text-gray-600 hover:text-blue-600">
                ←
            </button>
        </div>
    </div>
    
    <script>
        // 移动端交互增强
        document.addEventListener('DOMContentLoaded', function() {
            // 按钮点击反馈
            const buttons = document.querySelectorAll('.btn-press');
            buttons.forEach(btn => {
                btn.addEventListener('touchstart', function() {
                    this.classList.add('opacity-90');
                });
                btn.addEventListener('touchend', function() {
                    this.classList.remove('opacity-90');
                });
            });
            
            // 滚动显示底部提示
            let lastScrollTop = 0;
            const bottomHint = document.querySelector('.fixed.bottom-0');
            
            window.addEventListener('scroll', function() {
                const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                
                if (scrollTop > lastScrollTop && scrollTop > 100) {
                    // 向下滚动
                    bottomHint.classList.remove('hidden');
                } else {
                    // 向上滚动
                    bottomHint.classList.add('hidden');
                }
                
                lastScrollTop = scrollTop;
            });
            
            // 自动跳转演示（5秒后）
            setTimeout(() => {
                // 注释掉自动跳转，让用户手动操作
                // window.location.href = 'onboarding-login.html';
            }, 5000);
        });
        
        // 页面跳转函数
        function navigateTo(page) {
            // 添加页面切换动画
            document.body.style.opacity = '0.8';
            document.body.style.transition = 'opacity 0.3s ease';
            
            setTimeout(() => {
                window.location.href = page;
            }, 300);
        }
    </script>
</body>
</html>
