<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>课程列表 - 知行中国志愿者学习端</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 移动端适配 */
        @media (max-width: 640px) {
            .mobile-container {
                max-width: 100%;
                margin: 0 auto;
            }
        }
        
        /* 底部导航栏 */
        .tab-bar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        /* 课程卡片样式 */
        .course-card {
            transition: all 0.3s ease;
            border-radius: 16px;
            overflow: hidden;
        }
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        /* 分类标签 */
        .category-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .category-tag:hover {
            transform: scale(1.05);
        }
        
        /* 筛选器样式 */
        .filter-pill {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .filter-pill.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }
        
        /* 搜索框样式 */
        .search-input {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        .search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        /* 安全区域适配 */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* 加载动画 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* 滚动条样式 */
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        /* 星级评分 */
        .star-rating {
            color: #fbbf24;
            font-size: 14px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col mobile-container">
    <!-- 状态栏模拟 -->
    <div class="bg-white safe-top">
        <div class="flex justify-between items-center px-4 py-2">
            <div class="text-sm font-medium">9:41</div>
            <div class="flex space-x-1">
                <div class="w-4 h-4 bg-gray-800 rounded-full"></div>
                <div class="w-4 h-4 bg-gray-800 rounded-full"></div>
                <div class="w-4 h-4 bg-gray-800 rounded-full"></div>
            </div>
        </div>
    </div>
    
    <!-- 顶部导航 -->
    <header class="bg-white border-b border-gray-200 px-4 py-3">
        <div class="flex items-center justify-between mb-3">
            <button onclick="window.location.href='home-dashboard.html'" 
                    class="w-10 h-10 flex items-center justify-center text-gray-600 hover:text-blue-600 rounded-full hover:bg-gray-100">
                ←
            </button>
            <h1 class="text-lg font-bold text-gray-800">课程中心</h1>
            <div class="w-10"></div> <!-- 占位 -->
        </div>
        
        <!-- 搜索框 -->
        <div class="relative">
            <input type="text" 
                   id="search-input"
                   class="search-input w-full px-4 py-3 pl-12 rounded-xl bg-gray-50"
                   placeholder="搜索课程、讲师、关键词..."
                   autocomplete="off">
            <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
            <button id="clear-search" class="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600 hidden">
                ✕
            </button>
        </div>
    </header>
    
    <!-- 主内容 -->
    <main class="flex-1 overflow-y-auto scrollbar-hide">
        <!-- 分类筛选 -->
        <div class="px-4 py-3 bg-white border-b border-gray-200">
            <div class="flex overflow-x-auto scrollbar-hide space-x-2 pb-2">
                <button class="filter-pill active whitespace-nowrap" data-category="all">
                    全部课程
                </button>
                <button class="filter-pill whitespace-nowrap" data-category="beginner">
                    入门基础
                </button>
                <button class="filter-pill whitespace-nowrap" data-category="intermediate">
                    中级进阶
                </button>
                <button class="filter-pill whitespace-nowrap" data-category="advanced">
                    高级专业
                </button>
                <button class="filter-pill whitespace-nowrap" data-category="popular">
                    热门推荐
                </button>
                <button class="filter-pill whitespace-nowrap" data-category="new">
                    最新上架
                </button>
            </div>
        </div>
        
        <!-- 排序选项 -->
        <div class="px-4 py-3 bg-white border-b border-gray-200">
            <div class="flex items-center justify-between">
                <span class="text-sm text-gray-600">共 156 门课程</span>
                <div class="flex items-center space-x-2">
                    <select id="sort-select" class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="recommend">智能推荐</option>
                        <option value="popular">最受欢迎</option>
                        <option value="newest">最新上架</option>
                        <option value="rating">评分最高</option>
                        <option value="duration">时长最短</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- 课程列表 -->
        <div class="p-4" id="courses-container">
            <!-- 课程卡片将通过JavaScript动态生成 -->
        </div>
        
        <!-- 加载更多 -->
        <div class="px-4 py-6 text-center">
            <button id="load-more" 
                    class="px-6 py-3 bg-white text-gray-700 font-medium rounded-xl border border-gray-300 hover:border-blue-300 hover:text-blue-600">
                加载更多课程
            </button>
        </div>
        
        <!-- 底部留白 -->
        <div class="h-20"></div>
    </main>
    
    <!-- 底部导航栏 -->
    <nav class="tab-bar safe-bottom">
        <div class="flex justify-around items-center px-2 py-3">
            <a href="home-dashboard.html" class="flex flex-col items-center text-gray-500 hover:text-blue-600">
                <span class="text-2xl mb-1">🏠</span>
                <span class="text-xs">首页</span>
            </a>
            
            <a href="course-list.html" class="flex flex-col items-center text-blue-600">
                <span class="text-2xl mb-1">📚</span>
                <span class="text-xs font-medium">课程</span>
            </a>
            
            <a href="practice-scenarios.html" class="flex flex-col items-center text-gray-500 hover:text-blue-600">
                <span class="text-2xl mb-1">🎮</span>
                <span class="text-xs">实践</span>

            <a href="community-feed.html" class="flex flex-col items-center text-gray-500 hover:text-blue-600">

            <a href="profile-overview.html" class="flex flex-col items-center text-gray-500 hover:text-blue-600">

                <span class="text-xs">我的</span>
            </a>
        </div>
    </nav>
    
    <!-- 原型导航 -->
    <div class="fixed top-4 right-4 z-10">
        <div class="bg-white rounded-full shadow-lg p-2">
            <button onclick="window.location.href='../index.html'" 
                    class="w-10 h-10 flex items-center justify-center text-gray-600 hover:text-blue-600">

            </button>
        </div>
    </div>
    
    <script>
        // 课程数据
        const courses = [
            {

            {

                description: '掌握与老年痴呆症患者有效沟通的方法和策略',
                category: 'intermediate',

                rating: 4.9,

                instructor: '李医生',

                progress: 30,

                isFeatured: true,
                tags: ['沟通技巧', '心理支持', '情绪管理'],
                icon: '🗣️',
                color: 'green'
            },
            {
                id: 3,
                title: '认知训练游戏设计',
                description: '学习设计适合认知障碍患者的训练游戏和活动',
                category: 'advanced',
                level: '高级',
                duration: '6小时',
                rating: 4.7,
                students: 890,
                instructor: '张老师',
                instructorTitle: '康复治疗师',
                progress: 0,
                isEnrolled: false,
                isFeatured: false,
                tags: ['游戏设计', '认知训练', '活动策划'],
                icon: '🎮',
                color: 'purple'
            },
            {
                id: 4,
                title: '紧急情况处理指南',
                description: '学习认知障碍患者突发紧急情况的处理方法',
                category: 'intermediate',
                level: '中级',
                duration: '2.5小时',
                rating: 4.6,
                students: 1560,
                instructor: '赵护士',
                instructorTitle: '急诊科护士长',
                progress: 0,
                isEnrolled: false,
                isFeatured: true,
                tags: ['急救知识', '应急预案', '安全处理'],
                icon: '🚑',
                color: 'red'
            },
            {
                id: 5,
                title: '营养与饮食管理',
                description: '了解认知障碍患者的营养需求和饮食管理方法',
                category: 'beginner',
                level: '入门',
                duration: '3.5小时',
                rating: 4.5,
                students: 1320,
                instructor: '陈营养师',
                instructorTitle: '临床营养师',
                progress: 0,
                isEnrolled: false,
                isFeatured: false,
                tags: ['营养学', '饮食管理', '食谱设计'],
                icon: '🍎',
                color: 'yellow'
            },
            {
                id: 6,
                title: '家庭护理环境优化',
                description: '学习如何优化家庭环境以更好地照顾认知障碍患者',
                category: 'intermediate',
                level: '中级',
                duration: '4小时',
                rating: 4.7,
                students: 980,
                instructor: '刘设计师',
                instructorTitle: '无障碍环境设计师',
                progress: 0,
                isEnrolled: false,
                isFeatured: false,
                tags: ['环境设计', '安全改造', '居家护理'],
                icon: '🏠',
                color: 'indigo'
            },
            {
                id: 7,
                title: '认知障碍法律知识',
                description: '了解与认知障碍相关的法律知识和权益保护',
                category: 'advanced',
                level: '高级',
                duration: '5小时',
                rating: 4.4,
                students: 650,
                instructor: '孙律师',
                instructorTitle: '医疗法律专家',
                progress: 0,
                isEnrolled: false,
                isFeatured: false,
                tags: ['法律知识', '权益保护', '医疗法规'],
                icon: '⚖️',
                color: 'gray'
            },
            {
                id: 8,
                title: '心理支持与自我照顾',
                description: '学习为照顾者提供心理支持和自我照顾的方法',
                category: 'beginner',
                level: '入门',
                duration: '3小时',
                rating: 4.8,
                students: 2100,
                instructor: '周心理咨询师',
                instructorTitle: '心理咨询师',
                progress: 0,
                isEnrolled: false,
                isFeatured: true,
                tags: ['心理支持', '自我照顾', '压力管理'],
                icon: '💆',
                color: 'pink'
            }
        ];

        // 当前状态
        let currentCategory = 'all';
        let currentSort = 'recommend';
        let currentSearch = '';
        let displayedCourses = 4;

        // 渲染课程卡片
        function renderCourses() {
            const container = document.getElementById('courses-container');
            if (!container) return;
            
            // 清空容器
            container.innerHTML = '';
            
            // 过滤课程
            let filteredCourses = courses.filter(course => {
                // 分类过滤
                if (currentCategory !== 'all' && course.category !== currentCategory) {
                    return false;
                }
                
                // 搜索过滤
                if (currentSearch) {
                    const searchLower = currentSearch.toLowerCase();
                    return course.title.toLowerCase().includes(searchLower) ||
                           course.description.toLowerCase().includes(searchLower) ||
                           course.instructor.toLowerCase().includes(searchLower) ||
                           course.tags.some(tag => tag.toLowerCase().includes(searchLower));
                }
                
                return true;
            });
            
            // 排序
            filteredCourses.sort((a, b) => {
                switch(currentSort) {
                    case 'popular':
                        return b.students - a.students;
                    case 'newest':
                        return b.id - a.id;
                    case 'rating':
                        return b.rating - a.rating;
                    case 'duration':
                        const aDuration = parseFloat(a.duration);
                        const bDuration = parseFloat(b.duration);
                        return aDuration - bDuration;
                    case 'recommend':
                    default:
                        // 推荐算法：已报名 > 特色课程 > 评分 > 学生数
                        if (a.isEnrolled !== b.isEnrolled) return b.isEnrolled - a.isEnrolled;
                        if (a.isFeatured !== b.isFeatured) return b.isFeatured - a.isFeatured;
                        if (b.rating !== a.rating) return b.rating - a.rating;
                        return b.students - a.students;
                }
            });
            
            // 限制显示数量
            const coursesToShow = filteredCourses.slice(0, displayedCourses);
            
            // 生成课程卡片
            coursesToShow.forEach(course => {
                const card = document.createElement('div');
                card.className = 'course-card bg-white mb-4 p-4';
                card.innerHTML = `
                    <div class="flex">
                        <!-- 课程图标 -->
                        <div class="w-16 h-16 ${getColorClass(course.color)} rounded-xl flex items-center justify-center mr-4">
                            <span class="text-2xl">${course.icon}</span>
                        </div>
                        
                        <!-- 课程信息 -->
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="font-bold text-gray-800 mb-1">${course.title}</h3>
                                    <div class="flex items-center space-x-2 mb-2">
                                        <span class="category-tag ${getCategoryColor(course.category)}">
                                            ${course.level}
                                        </span>
                                        ${course.isFeatured ? '<span class="category-tag bg-red-100 text-red-800">🔥 推荐</span>' : ''}
                                    </div>
                                </div>
                                ${course.isEnrolled ? 
                                    `<div class="text-right">
                                        <div class="text-sm font-medium text-blue-600 mb-1">${course.progress}%</div>
                                        <div class="w-20 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                            <div class="h-full bg-blue-500" style="width: ${course.progress}%"></div>
                                        </div>
                                    </div>` : ''
                                }
                            </div>
                            
                            <p class="text-sm text-gray-600 mb-3 line-clamp-2">${course.description}</p>
                            
                            <!-- 课程详情 -->
                            <div class="flex items-center justify-between text-sm text-gray-500">
                                <div class="flex items-center space-x-4">
                                    <div class="flex items-center">
                                        <span class="star-rating mr-1">${'★'.repeat(Math.floor(course.rating))}${'☆'.repeat(5-Math.floor(course.rating))}</span>
                                        <span class="ml-1">${course.rating}</span>
                                    </div>
                                    <div class="flex items-center">
                                        <span class="mr-1">👥</span>
                                        <span>${formatNumber(course.students)}</span>
                                    </div>
                                    <div class="flex items-center">
                                        <span class="mr-1">🕒</span>
                                        <span>${course.duration}</span>
                                    </div>
                                </div>
                                
                                <div class="flex items-center">
                                    <div class="w-6 h-6 ${getColorClass(course.color)} rounded-full flex items-center justify-center mr-2">
                                        <span class="text-xs">${course.instructor.charAt(0)}</span>
                                    </div>
                                    <span class="text-xs">${course.instructor}</span>
                                </div>
                            </div>
                            
                            <!-- 标签 -->
                            <div class="flex flex-wrap gap-1 mt-3">
                                ${course.tags.map(tag => `
                                    <span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded">${tag}</span>
                                `).join('')}
                            </div>
                            
                            <!-- 操作按钮 -->
                            <div class="flex space-x-2 mt-4">
                                ${course.isEnrolled ? 
                                    `<button onclick="window.location.href='course-detail.html?id=${course.id}'" 
                                            class="flex-1 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700">
                                        继续学习
                                    </button>
                                    <button class="px-4 py-2.5 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200">
                                        详情
                                    </button>` :
                                    `<button onclick="window.location.href='course-detail.html?id=${course.id}'" 
                                            class="flex-1 py-2.5 bg-white text-blue-600 font-medium rounded-lg border border-blue-300 hover:bg-blue-50">
                                        立即报名
                                    </button>
                                    <button class="px-4 py-2.5 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200">
                                        试看
                                    </button>`
                                }
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            // 如果没有课程
            if (coursesToShow.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="text-gray-400 text-4xl mb-4">📚</div>
                        <h3 class="text-lg font-medium text-gray-800 mb-2">未找到相关课程</h3>
                        <p class="text-gray-600 mb-6">尝试调整筛选条件或搜索关键词</p>
                        <button onclick="resetFilters()" 
                                class="px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700">
                            重置筛选条件
                        </button>
                    </div>
                `;
            }
            
            // 更新课程数量
            updateCourseCount(filteredCourses.length);
        }

        // 获取颜色类
        function getColorClass(color) {
            const classes = {
                blue: 'bg-blue-100 text-blue-600',
                green: 'bg-green-100 text-green-600',
                purple: 'bg-purple-100 text-purple-600',
                red: 'bg-red-100 text-red-600',
                yellow: 'bg-yellow-100 text-yellow-600',
                indigo: 'bg-indigo-100 text-indigo-600',
                gray: 'bg-gray-100 text-gray-600',
                pink: 'bg-pink-100 text-pink-600'
            };
            return classes[color] || 'bg-gray-100 text-gray-600';
        }

        // 获取分类颜色
        function getCategoryColor(category) {
            const colors = {
                beginner: 'bg-blue-100 text-blue-800',
                intermediate: 'bg-green-100 text-green-800',
                advanced: 'bg-purple-100 text-purple-800'
            };
            return colors[category] || 'bg-gray-100 text-gray-800';
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        // 更新课程数量
        function updateCourseCount(count) {
            const countElement = document.querySelector('.text-sm.text-gray-600');
            if (countElement) {
                countElement.textContent = `共 ${count} 门课程`;
            }
        }

        // 重置筛选条件
        function resetFilters() {
            currentCategory = 'all';
            currentSearch = '';
            displayedCourses = 4;
            
            // 更新UI
            document.querySelectorAll('.filter-pill').forEach(btn => {
                if (btn.dataset.category === 'all') {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            document.getElementById('search-input').value = '';
            document.getElementById('clear-search').classList.add('hidden');
            document.getElementById('sort-select').value = 'recommend';
            
            // 重新渲染
            renderCourses();
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始渲染
            renderCourses();
            
            // 设置分类筛选
            document.querySelectorAll('.filter-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    const category = this.dataset.category;
                    currentCategory = category;
                    
                    // 更新按钮状态
                    document.querySelectorAll('.filter-pill').forEach(b => {
                        if (b === this) {
                            b.classList.add('active');
                        } else {
                            b.classList.remove('active');
                        }
                    });
                    
                    // 重新渲染
                    renderCourses();
                });
            });
            
            // 设置排序
            document.getElementById('sort-select').addEventListener('change', function() {
                currentSort = this.value;
                renderCourses();
            });
            
            // 设置搜索
            const searchInput = document.getElementById('search-input');
            const clearSearch = document.getElementById('clear-search');
            
            searchInput.addEventListener('input', function() {
                currentSearch = this.value.trim();
                
                if (currentSearch) {
                    clearSearch.classList.remove('hidden');
                } else {
                    clearSearch.classList.add('hidden');
                }
                
                // 防抖处理
                clearTimeout(this.searchTimeout);
                this.searchTimeout = setTimeout(() => {
                    renderCourses();
                }, 300);
            });
            
            clearSearch.addEventListener('click', function() {
                searchInput.value = '';
                currentSearch = '';
                this.classList.add('hidden');
                renderCourses();
                searchInput.focus();
            });
            
            // 加载更多
            document.getElementById('load-more').addEventListener('click', function() {
                displayedCourses += 4;
                renderCourses();
                
                // 如果已经显示所有课程，隐藏按钮
                const totalCourses = courses.filter(course => {
                    if (currentCategory !== 'all' && course.category !== currentCategory) return false;
                    if (currentSearch) {
                        const searchLower = currentSearch.toLowerCase();
                        return course.title.toLowerCase().includes(searchLower) ||
                               course.description.toLowerCase().includes(searchLower);
                    }
                    return true;
                }).length;
                
                if (displayedCourses >= totalCourses) {
                    this.style.display = 'none';
                }
            });
            
            // 课程卡片点击效果
            document.addEventListener('click', function(e) {
                const card = e.target.closest('.course-card');
                if (card && !e.target.closest('button')) {
                    card.style.transform = 'scale(0.98)';
                    setTimeout(() => {
                        card.style.transform = '';
                    }, 200);
                    
                    // 模拟页面跳转
                    setTimeout(() => {
                        window.location.href = 'course-detail.html';
                    }, 300);
                }
            });
        });
    </script>
</body>
</html>
