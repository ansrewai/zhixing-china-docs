    <!-- 登录检查 -->
    <script>
        function checkLogin() {
            const loginData = localStorage.getItem('zhixing_login');
            const hasCookie = document.cookie.split(';').some(cookie => 
                cookie.trim().startsWith('zhixing_auth=')
            );
            if (!loginData && !hasCookie) {
                window.location.href = 'login.html';
                return false;
            }
            if (loginData) {
                try {
                    const data = JSON.parse(loginData);
                    const now = new Date().getTime();
                    const sevenDays = 7 * 24 * 60 * 60 * 1000;
                    if (data.remember && (now - data.timestamp) > sevenDays) {
                        localStorage.removeItem('zhixing_login');
                        window.location.href = 'login.html';
                        return false;
                    }
                } catch (e) {
                    localStorage.removeItem('zhixing_login');
                    window.location.href = 'login.html';
                    return false;
                }
            }
            return true;
        }
        
        if (!checkLogin()) {
            throw new Error('未登录，重定向中...');
        }
        
        // 显示用户信息（确保只显示一次）
        function displayUserInfo() {
            const loginData = localStorage.getItem('zhixing_login');
            if (loginData) {
                try {
                    const data = JSON.parse(loginData);
                    
                    // 检查是否已经存在用户信息显示
                    const existingUserInfo = document.querySelector('.user-info-display');
                    if (existingUserInfo) {
                        existingUserInfo.remove();
                    }
                    
                    const userInfoDiv = document.createElement('div');
                    userInfoDiv.className = 'user-info-display flex items-center space-x-2';
                    userInfoDiv.innerHTML = `
                        <span class="text-sm text-gray-700">欢迎，${data.username}</span>
                        <button id="logout-btn" class="bg-red-500 hover:bg-red-600 text-white text-xs px-2 py-1 rounded transition-colors">
                            退出
                        </button>
                    `;
                    
                    const nav = document.querySelector('nav .flex:last-child');
                    if (nav) {
                        nav.appendChild(userInfoDiv);
                        
                        // 添加退出功能
                        document.getElementById('logout-btn').addEventListener('click', function() {
                            localStorage.removeItem('zhixing_login');
                            document.cookie = 'zhixing_auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                            window.location.href = 'login.html';
                        });
                    }
                } catch (e) {
                    console.error('用户信息显示错误:', e);
                }
            }
        }

        // 高亮搜索词
        function highlightText(text, searchTerm) {
            if (!searchTerm) return text;
            const regex = new RegExp(`(${searchTerm})`, 'gi');
            return text.replace(regex, '<span class="bg-yellow-200 px-1 rounded">$1</span>');
        }
