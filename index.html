    <!-- 登录检查 -->
    <script>
        function checkLogin() {
            const loginData = localStorage.getItem('zhixing_login');
            const hasCookie = document.cookie.split(';').some(cookie => 
                cookie.trim().startsWith('zhixing_auth=')
            );
            if (!loginData && !hasCookie) {
                window.location.href = 'login.html';
                return false;
            }
            if (loginData) {
                try {
                    const data = JSON.parse(loginData);
                    const now = new Date().getTime();
                    const sevenDays = 7 * 24 * 60 * 60 * 1000;
                    if (data.remember && (now - data.timestamp) > sevenDays) {
                        localStorage.removeItem('zhixing_login');
                        window.location.href = 'login.html';
                        return false;
                    }
                } catch (e) {
                    localStorage.removeItem('zhixing_login');
                    window.location.href = 'login.html';
                    return false;
                }
            }
            return true;
        }
        
        if (!checkLogin()) {
            throw new Error('未登录，重定向中...');
        }
        
        // 显示用户信息（确保只显示一次）
        function displayUserInfo() {
            const loginData = localStorage.getItem('zhixing_login');
            if (loginData) {
                try {
                    const data = JSON.parse(loginData);
                    
                    // 检查是否已经存在用户信息显示
                    const existingUserInfo = document.querySelector('.user-info-display');
                    if (existingUserInfo) {
                        existingUserInfo.remove();
                    }
                    
                    const userInfoDiv = document.createElement('div');
                    userInfoDiv.className = 'user-info-display flex items-center space-x-2';
                    userInfoDiv.innerHTML = `
                        <span class="text-sm text-gray-700">欢迎，${data.username}</span>
                        <button id="logout-btn" class="bg-red-500 hover:bg-red-600 text-white text-xs px-2 py-1 rounded transition-colors">
                            退出
                        </button>
                    `;
                    
                    const nav = document.querySelector('nav .flex:last-child');
                    if (nav) {
                        nav.appendChild(userInfoDiv);
                        
                        // 添加退出功能
                        document.getElementById('logout-btn').addEventListener('click', function() {
                            localStorage.removeItem('zhixing_login');
                            document.cookie = 'zhixing_auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                            window.location.href = 'login.html';
                        });
                    }
                } catch (e) {
                    console.error('用户信息显示错误:', e);
                }
            }
        }

                    doc.title.toLowerCase().includes(searchTerm) ||
                    doc.description.toLowerCase().includes(searchTerm) ||
                    doc.category.toLowerCase().includes(searchTerm)
                );
                
                container.innerHTML = '';
                
                if (filteredDocs.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-3 text-center py-12">
                            <div class="text-gray-400 mb-2">🔍</div>
                            <div class="text-gray-500">未找到匹配的文档</div>
                            <div class="text-gray-400 text-sm mt-1">尝试其他关键词</div>
                        </div>
                    `;
                    return;
                }
                
                filteredDocs.forEach(doc => {
                    const categoryClass = {
                        'core': 'category-core',
                        'analysis': 'category-analysis',
                        'plan': 'category-plan',
                        'tech': 'category-tech'
                    }[doc.category] || 'bg-gray-100 text-gray-800';
                    
                    const card = document.createElement('div');
                    card.className = 'doc-card bg-white rounded-xl border border-gray-200 p-5';
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="${categoryClass} category-badge">${getCategoryName(doc.category)}</span>
                            </div>
                            <div class="text-xs text-gray-500">${doc.date}</div>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2">${highlightText(doc.title, searchTerm)}</h3>
                        <p class="text-gray-600 text-sm mb-4">${highlightText(doc.description, searchTerm)}</p>
                        <div class="flex justify-between items-center">
                            <div class="text-xs text-gray-500">${doc.size}</div>
                            <a href="document.html?doc=${encodeURIComponent(doc.id)}" 
                               class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
                                阅读文档
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }
        
        // 高亮搜索词
        function highlightText(text, searchTerm) {
            if (!searchTerm) return text;
            const regex = new RegExp(`(${searchTerm})`, 'gi');
            return text.replace(regex, '<span class="bg-yellow-200 px-1 rounded">$1</span>');
        }
        
        // 分类筛选
        let currentCategory = 'all';
        function setupCategoryFilter() {
            document.querySelectorAll('.category-filter').forEach(btn => {
                btn.addEventListener('click', function() {
                    const category = this.dataset.category;
                    currentCategory = category;
                    
                    // 更新按钮状态
                    document.querySelectorAll('.category-filter').forEach(b => {
                        if (b.dataset.category === category) {
                            b.classList.remove('bg-gray-100', 'text-gray-800');
                            b.classList.add('bg-blue-100', 'text-blue-800');
                        } else {
                            b.classList.remove('bg-blue-100', 'text-blue-800');
                            b.classList.add('bg-gray-100', 'text-gray-800');
                        }
                    });
                    
                    // 清空搜索框
                    const searchInput = document.getElementById('search-input');
                    if (searchInput) searchInput.value = '';
                    
                    // 重新渲染文档卡片
                    renderDocumentCards(category);
                });
            });
        }

        // 渲染原型卡片
        function renderPrototypeCards(filterType = 'all') {
            const container = document.getElementById('prototypes-container');
            if (!container) return;
            
            container.innerHTML = '';
            
            const filteredPrototypes = filterType === 'all' 
                ? prototypes 
                : prototypes.filter(proto => proto.type === filterType);
            
            // 按优先级排序
            filteredPrototypes.sort((a, b) => a.priority - b.priority);
            
            filteredPrototypes.forEach(proto => {
                const typeClass = {
                    'onboarding': 'bg-purple-100 text-purple-800',
                    'learning': 'bg-green-100 text-green-800',
                    'practice': 'bg-yellow-100 text-yellow-800',
                    'community': 'bg-red-100 text-red-800',
                    'profile': 'bg-indigo-100 text-indigo-800'
                }[proto.type] || 'bg-gray-100 text-gray-800';
                
                const typeName = {
                    'onboarding': '引导流程',
                    'learning': '学习功能',
                    'practice': '实践功能',
                    'community': '社区功能',
                    'profile': '个人中心'
                }[proto.type] || '其他';
                
                // 状态标签
                const statusClass = {
                    'completed': 'bg-green-100 text-green-800',
                    'in-progress': 'bg-yellow-100 text-yellow-800',
                    'planned': 'bg-gray-100 text-gray-800'
                }[proto.status] || 'bg-gray-100 text-gray-800';
                
                const statusText = {
                    'completed': '已完成',
                    'in-progress': '进行中',
                    'planned': '计划中'
                }[proto.status] || '计划中';
                
                // 按钮状态
                let buttonHtml = '';
                if (proto.status === 'completed') {
                    buttonHtml = `
                        <a href="${proto.path}" target="_blank"
                           class="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white text-sm font-medium rounded-lg transition-all transform hover:scale-105">
                            查看原型
                        </a>
                    `;
                } else {
                    buttonHtml = `
                        <button class="px-4 py-2 bg-gray-200 text-gray-600 text-sm font-medium rounded-lg cursor-not-allowed" disabled>
                            即将推出
                        </button>
                    `;
                }
                
                const card = document.createElement('div');
                card.className = 'prototype-card bg-white rounded-xl border border-gray-200 p-5 hover:shadow-lg transition-shadow';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="text-3xl">${proto.thumbnail}</div>
                        <div class="flex flex-col items-end gap-1">
                            <span class="${typeClass} px-3 py-1 rounded-full text-xs font-medium">${typeName}</span>
                            <span class="${statusClass} px-2 py-0.5 rounded-full text-xs">${statusText}</span>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 mb-2">${proto.title}</h3>
                    <p class="text-gray-600 text-sm mb-4">${proto.description}</p>
                    <div class="flex justify-between items-center">
                        <div class="text-xs text-gray-500">移动端页面</div>
                        ${buttonHtml}
                    </div>
                `;
                container.appendChild(card);
            });
            
            // 如果没有原型
            if (filteredPrototypes.length === 0) {
                container.innerHTML = `
                    <div class="col-span-3 text-center py-12">
                        <div class="text-gray-400 mb-2">📱</div>
                        <div class="text-gray-500">该分类下暂无原型页面</div>
                    </div>
                `;

        }

        // 设置原型筛选
        function setupPrototypeFilter() {
            document.querySelectorAll('.prototype-filter').forEach(btn => {
                btn.addEventListener('click', function() {
                    const type = this.dataset.type;
                    
                    // 更新按钮状态
                    document.querySelectorAll('.prototype-filter').forEach(b => {
                        if (b.dataset.type === type) {
                            b.classList.remove('bg-gray-100', 'text-gray-800');
                            if (type === 'all') {
                                b.classList.add('bg-blue-100', 'text-blue-800');
                            } else if (type === 'onboarding') {
                                b.classList.add('bg-purple-100', 'text-purple-800');
                            } else if (type === 'learning') {
                                b.classList.add('bg-green-100', 'text-green-800');
                            } else if (type === 'practice') {
                                b.classList.add('bg-yellow-100', 'text-yellow-800');
                            } else if (type === 'community') {
                                b.classList.add('bg-red-100', 'text-red-800');
                            } else if (type === 'profile') {
                                b.classList.add('bg-indigo-100', 'text-indigo-800');
                            }
                        } else {
                            b.classList.remove('bg-blue-100', 'text-blue-800', 'bg-purple-100', 'text-purple-800', 'bg-green-100', 'text-green-800', 'bg-yellow-100', 'text-yellow-800', 'bg-red-100', 'text-red-800', 'bg-indigo-100', 'text-indigo-800');
                            b.classList.add('bg-gray-100', 'text-gray-800');
                        }
                    });
                    
                    // 重新渲染原型卡片
                    renderPrototypeCards(type);
                });
            });
        }

        // 设置标签切换
        function setupTabSwitching() {
            const tabDocs = document.getElementById('tab-docs');
            const tabPrototypes = document.getElementById('tab-prototypes');
            const docsSection = document.getElementById('docs-section');
            const prototypesSection = document.getElementById('prototypes-section');
            
            if (!tabDocs || !tabPrototypes || !docsSection || !prototypesSection) return;
            
            tabDocs.addEventListener('click', function() {
                // 更新标签状态
                tabDocs.classList.add('active', 'border-blue-600', 'text-gray-800');
                tabDocs.classList.remove('text-gray-500');
                tabPrototypes.classList.remove('active', 'border-blue-600', 'text-gray-800');
                tabPrototypes.classList.add('text-gray-500');
                
                // 显示文档部分，隐藏原型部分
                docsSection.classList.remove('hidden');
                docsSection.classList.add('active');
                prototypesSection.classList.add('hidden');
                prototypesSection.classList.remove('active');
            });
            
            tabPrototypes.addEventListener('click', function() {
                // 更新标签状态
                tabPrototypes.classList.add('active', 'border-blue-600', 'text-gray-800');
                tabPrototypes.classList.remove('text-gray-500');
                tabDocs.classList.remove('active', 'border-blue-600', 'text-gray-800');
                tabDocs.classList.add('text-gray-500');
                
                // 显示原型部分，隐藏文档部分
                prototypesSection.classList.remove('hidden');
                prototypesSection.classList.add('active');
                docsSection.classList.add('hidden');
                docsSection.classList.remove('active');
                
                // 初始渲染原型（如果还没渲染）
                if (document.getElementById('prototypes-container').innerHTML === '') {
                    renderPrototypeCards('all');
                    setupPrototypeFilter();
                }
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始渲染所有文档
            renderDocumentCards('all');
            
            // 初始渲染原型卡片（确保原型部分有内容）
            renderPrototypeCards('all');
            setupPrototypeFilter();
            
            // 设置搜索功能
            setupSearch();
            
            // 设置分类筛选
            setupCategoryFilter();
            
            // 设置标签切换
            setupTabSwitching();
            
            // 显示用户信息
            displayUserInfo();
        });
    </script>
