        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Update timestamps

            // Initialize highlight.js
            hljs.highlightAll();

        // Update timestamps
        function updateTimestamps() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'Asia/Shanghai'
            };
            const formattedTime = now.toLocaleString('zh-CN', options);
            
            document.getElementById('last-update-time').textContent = formattedTime;
            document.getElementById('footer-update-time').textContent = formattedTime;
        }

        // Render documents
        function renderDocuments(docs) {
            const grid = document.getElementById('document-grid');
            grid.innerHTML = '';
            
            docs.forEach(doc => {
                const card = createDocumentCard(doc);
                grid.appendChild(card);
            });
        }

        // Create document card
        function createDocumentCard(doc) {
            const card = document.createElement('div');
            card.className = 'doc-card bg-white rounded-xl shadow-lg p-6';
            card.dataset.id = doc.id;
            card.dataset.category = doc.category;
            card.dataset.tags = doc.tags.join(',');
            
            // Tags HTML
            const tagsHTML = doc.tags.map(tag => {
                let colorClass = 'bg-gray-100 text-gray-800';
                if (tag === '已完成') colorClass = 'bg-green-100 text-green-800';
                if (tag === '进行中') colorClass = 'bg-yellow-100 text-yellow-800';
                if (tag === '核心文档') colorClass = 'bg-blue-100 text-blue-800';
                if (tag === '分析报告') colorClass = 'bg-purple-100 text-purple-800';
                if (tag === '技术文档') colorClass = 'bg-red-100 text-red-800';
                
                return `<span class="px-2 py-1 rounded-full text-xs font-medium ${colorClass}">${tag}</span>`;
            }).join(' ');
            
            // Action buttons based on file type
            let actionButton = '';
            if (doc.isPPT) {
                actionButton = `
                    <button class="view-ppt-btn px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium" data-path="${doc.path}">
                        下载PPT
                    </button>
                `;
            } else {
                actionButton = `
                    <button class="view-doc-btn px-4 py-2 bg-gradient-to-r from-blue-500 to-purple-500 text-white rounded-lg hover:from-blue-600 hover:to-purple-600 transition-colors text-sm font-medium" data-path="${doc.path}">
                        阅读文档
                    </button>
                `;
            }
            
            card.innerHTML = `
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <div class="text-2xl">${doc.icon}</div>
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg">${doc.title}</h3>
                            <div class="flex items-center space-x-2 text-sm text-gray-600 mt-1">
                                <span>${doc.wordCount}</span>
                                <span>•</span>
                                <span>${doc.time}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        ${actionButton}
                    </div>
                </div>
                
                <p class="text-gray-600 mb-4">${doc.description}</p>
                
                <div class="flex flex-wrap gap-2 mb-4">
                    ${tagsHTML}
                </div>
                
                <div class="flex justify-between items-center text-sm text-gray-500">
                    <span>${getCategoryName(doc.category)}</span>
                    <span class="flex items-center">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                        点击查看
                    </span>
                </div>
            `;
            
            return card;
        }

        // Get category name

            const categories = {
                'all': '全部文档',
                'core': '核心项目文档',
                'analysis': '竞品分析与研究',
                'execution': '项目执行与结构',
                'technical': '技术配置'
            };
            return categories[category] || category;
        }

                    this.classList.add('active');

                    // Implement format switching logic
                    console.log('切换到格式:', format);
                });
            });

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const category = this.dataset.category;
                    filterDocuments(category);
                    
                    // Update active state
                    document.querySelectorAll('.category-btn').forEach(b => {
                        b.classList.remove('font-medium', 'text-gray-700');
                        b.classList.add('text-gray-600');
                    });
                    this.classList.add('font-medium', 'text-gray-700');
                    this.classList.remove('text-gray-600');
                });
            });

            // Tag filter
            document.querySelectorAll('.tag-filter').forEach(tag => {
                tag.addEventListener('click', function() {
                    const tagName = this.dataset.tag;
                    filterByTag(tagName);
                });
            });

            // Search functionality
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', function() {
                const query = this.value.toLowerCase();
                searchDocuments(query);
            });

            // Document view buttons (will be added after cards are rendered)
            setTimeout(() => {
                document.querySelectorAll('.view-doc-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.dataset.path;
                        openDocumentModal(path);
                    });
                });

                document.querySelectorAll('.view-ppt-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.dataset.path;
                        window.open(path, '_blank');
                    });
                });
            }, 100);

            // Modal close button
            document.getElementById('close-modal').addEventListener('click', closeModal);

            // Modal format switcher
            document.querySelectorAll('.modal-format-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.modal-format-btn').forEach(b => {
                        b.classList.remove('active', 'bg-white', 'shadow');
                    });
                    this.classList.add('active', 'bg-white', 'shadow');
                    const format = this.dataset.format;
                    switchDocumentFormat(format);
                });
            });

            // Copy button
            document.getElementById('copy-btn').addEventListener('click', copyDocumentContent);

            // Download button
            document.getElementById('download-btn').addEventListener('click', downloadDocument);
        }

        // Filter documents by category
        function filterDocuments(category) {
            let filteredDocs = documents;
            if (category !== 'all') {
                filteredDocs = documents.filter(doc => doc.category === category);
            }
            renderDocuments(filteredDocs);
            
            // Re-attach event listeners to new buttons
            setTimeout(() => {
                document.querySelectorAll('.view-doc-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.dataset.path;
                        openDocumentModal(path);
                    });
                });
                document.querySelectorAll('.view-ppt-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.dataset.path;
                        window.open(path, '_blank');
                    });
                });
            }, 50);
        }

        // Filter by tag
        function filterByTag(tagName) {
            const filteredDocs = documents.filter(doc => doc.tags.includes(tagName));
            renderDocuments(filteredDocs);
            
            // Update UI
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('font-medium', 'text-gray-700');
                b.classList.add('text-gray-600');
            });
            document.querySelector('.category-btn[data-category="all"]').classList.add('font-medium', 'text-gray-700');
            
            // Re-attach event listeners
            setTimeout(() => {
                document.querySelectorAll('.view-doc-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.dataset.path;
                        openDocumentModal(path);
                    });
                });
                document.querySelectorAll('.view-ppt-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.dataset.path;
                        window.open(path, '_blank');
                    });
                });
            }, 50);
        }

        // Search documents
        function searchDocuments(query) {
            if (!query.trim()) {
                renderDocuments(documents);
                return;
            }
            
            const filteredDocs = documents.filter(doc => {
                return doc.title.toLowerCase().includes(query) || 
                       doc.description.toLowerCase().includes(query) ||
                       doc.tags.some(tag => tag.toLowerCase().includes(query));
            });
            
            renderDocuments(filteredDocs);
            
            // Highlight search terms in titles
            document.querySelectorAll('.doc-card h3').forEach(title => {
                const original = title.textContent;
                const highlighted = original.replace(
                    new RegExp(query, 'gi'),
                    match => `<span class="search-highlight">${match}</span>`
                );
                if (highlighted !== original) {
                    title.innerHTML = highlighted;
                }
            });
            
            // Re-attach event listeners
            setTimeout(() => {
                document.querySelectorAll('.view-doc-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.dataset.path;
                        openDocumentModal(path);
                    });
                });
                document.querySelectorAll('.view-ppt-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const path = this.dataset.path;
                        window.open(path, '_blank');
                    });
                });
            }, 50);
        }

        // Open document modal
        async function openDocumentModal(path) {
            try {
                // Show loading
                document.getElementById('modal-content').innerHTML = `
                    <div class="flex justify-center items-center h-64">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                    </div>
                `;
                
                // Show modal
                document.getElementById('document-modal').classList.remove('hidden');
                
                // Fetch document content
                const response = await fetch(path);
                if (!response.ok) throw new Error('文档加载失败');
                
                const content = await response.text();
                const fileName = path.split('/').pop();
                
                // Update modal info
                document.getElementById('modal-title').textContent = fileName;
                document.getElementById('modal-meta').innerHTML = `
                    <span>${path}</span> • 
                    <span>${content.length} 字符</span> • 
                    <span>${Math.ceil(content.length / 5)} 单词</span>
                `;
                
                // Update counts
                document.getElementById('char-count').textContent = content.length;
                document.getElementById('word-count').textContent = Math.ceil(content.length / 5);
                document.getElementById('reading-time').textContent = Math.ceil(content.length / 1000);
                
                // Store current content and path
                document.getElementById('modal-content').dataset.rawContent = content;
                document.getElementById('modal-content').dataset.currentPath = path;
                
                // Display in web format by default
                switchDocumentFormat('web');
                
            } catch (error) {
                document.getElementById('modal-content').innerHTML = `
                    <div class="text-center py-12">
                        <div class="text-red-500 text-6xl mb-4">❌</div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">文档加载失败</h3>
                        <p class="text-gray-600">${error.message}</p>
                        <button onclick="closeModal()" class="mt-4 px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition-colors">
                            关闭
                        </button>
                    </div>
                `;
            }
        }

        // Switch document format
        function switchDocumentFormat(format) {
            const contentDiv = document.getElementById('modal-content');
            const rawContent = contentDiv.dataset.rawContent;
            
            if (!rawContent) return;
            
            let displayContent = '';
            
            switch(format) {
                case 'web':
                    // Convert markdown to HTML (simplified version)
                    displayContent = convertMarkdownToHTML(rawContent);
                    contentDiv.className = 'prose max-w-none';
                    break;
                    
                case 'markdown':
                    displayContent = `<pre><code class="language-markdown">${escapeHtml(rawContent)}</code></pre>`;
                    contentDiv.className = '';
                    break;
                    
                case 'raw':
                    displayContent = `<pre class="whitespace-pre-wrap font-mono text-sm">${escapeHtml(rawContent)}</pre>`;
                    contentDiv.className = '';
                    break;
            }
            
            contentDiv.innerHTML = displayContent;
            
            // Re-initialize highlight.js for markdown format
            if (format === 'markdown') {
                hljs.highlightAll();
            }
        }
