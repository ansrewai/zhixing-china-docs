<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知行中国文档 - 登录</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .login-form {
            padding: 2rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 0.875rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            opacity: 0.9;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo">知行中国</div>
            <div class="subtitle">项目文档管理系统</div>
        </div>
        
        <div class="login-form">
            <h2 class="text-xl font-bold text-gray-800 mb-6">登录访问文档</h2>
            
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="username">
                        用户名
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input"
                        placeholder="请输入用户名"
                        required
                    >
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="password">
                        密码
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input"
                        placeholder="请输入密码"
                        required
                    >
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="remember" class="h-4 w-4 text-indigo-600">
                    <label for="remember" class="text-gray-700 text-sm">记住登录状态（7天）</label>
                </div>
                
                <div id="errorMessage" class="error-message">
                    用户名或密码错误，请重试。
                </div>
                
                <button type="submit" class="login-btn">
                    登录
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm text-gray-600">
                <p>首次登录？使用提供的用户名和密码</p>
                <p class="mt-1 text-xs text-gray-500">如需帮助，请联系系统管理员</p>
            </div>
        </div>
    </div>

    <script>
        // 登录验证逻辑
        const VALID_USERNAME = 'Andrew';
        const VALID_PASSWORD = 'zhixingzhongguo';
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorMessage = document.getElementById('errorMessage');
            
            // 验证凭证
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                // 清除错误消息
                errorMessage.style.display = 'none';
                
                // 创建登录会话
                const loginData = {
                    username: username,
                    timestamp: new Date().getTime(),
                    remember: remember
                };
                
                // 存储登录状态
                localStorage.setItem('zhixing_login', JSON.stringify(loginData));
                
                // 设置会话过期时间（7天或会话级）
                if (remember) {
                    const expiration = new Date();
                    expiration.setDate(expiration.getDate() + 7);
                    document.cookie = `zhixing_auth=true; expires=${expiration.toUTCString()}; path=/`;
                } else {
                    document.cookie = `zhixing_auth=true; path=/`;
                }
                
                // 重定向到主页面
                window.location.href = 'index.html';
            } else {
                // 显示错误消息
                errorMessage.style.display = 'block';
                
                // 清空密码字段
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
        
        // 检查是否已登录（防止重复登录）
        function checkLoginStatus() {
            const loginData = localStorage.getItem('zhixing_login');
            if (loginData) {
                try {
                    const data = JSON.parse(loginData);
                    const now = new Date().getTime();
                    const sevenDays = 7 * 24 * 60 * 60 * 1000;
                    
                    // 检查是否在有效期内（如果是记住登录状态）
                    if (data.remember && (now - data.timestamp) < sevenDays) {
                        // 自动重定向到主页面
                        window.location.href = 'index.html';
                    } else if (!data.remember) {
                        // 会话级登录，检查cookie
                        const cookies = document.cookie.split(';').some(cookie => 
                            cookie.trim().startsWith('zhixing_auth=')
                        );
                        if (cookies) {
                            window.location.href = 'index.html';
                        }
                    }
                } catch (e) {
                    // JSON解析失败，清除无效数据
                    localStorage.removeItem('zhixing_login');
                }
            }
        }
        
        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', checkLoginStatus);
        
        // 自动聚焦用户名输入框
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
